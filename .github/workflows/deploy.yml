name: Deploy to kumbakonamfreematrimony.com

# Auto-deploys on every push to main.
# Deploys frontend build output and backend PHP to shared hosting via FTPS.
# Secrets (config.php, sms.php, payu-config.php, frontend/API/db.php, uploads/)
# are NOT in the repo and are NEVER overwritten on the server.

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger from the Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Deploy frontend build → web root ───────────────────────────────────
      # Excludes backend/, uploads/, and server-side secrets so the root
      # deploy does not touch them.
      - name: Deploy frontend (dist → web root)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:          ${{ secrets.FTP_HOST }}
          username:        ${{ secrets.FTP_USER }}
          password:        ${{ secrets.FTP_PASSWORD }}
          port:            ${{ secrets.FTP_PORT || 21 }}
          protocol:        ftps
          local-dir:       ./frontend/dist/
          server-dir:      ${{ secrets.FTP_SERVER_DIR_FRONTEND }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/backend/**
            **/uploads/**
            **/cgi-bin/**
            **/.well-known/**
            **/.htaccess
            **/error_log

      # ── Deploy backend → /backend on server ────────────────────────────────
      # Excludes live secret files + user uploads + runtime logs so the
      # server-side copies survive each deploy.
      - name: Deploy backend (PHP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:          ${{ secrets.FTP_HOST }}
          username:        ${{ secrets.FTP_USER }}
          password:        ${{ secrets.FTP_PASSWORD }}
          port:            ${{ secrets.FTP_PORT || 21 }}
          protocol:        ftps
          local-dir:       ./backend/
          server-dir:      ${{ secrets.FTP_SERVER_DIR_BACKEND }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/config.php
            **/config.production.php
            **/sms.php
            **/payu-config.php
            **/api/uploads/**
            **/logs/**
            **/error_log
